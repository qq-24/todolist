name: todolist
description: "极简 Todo 同步工具"
publish_to: 'none'
version: 2026.3.31+3001

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  provider: ^6.1.0
  uuid: ^4.2.0
  crypto: ^3.0.0
  tray_manager: ^0.5.2
  local_notifier: ^0.1.6
  launch_at_startup: ^0.3.1
  window_manager: ^0.5.1
  hotkey_manager: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#2196F3"
  adaptive_icon_foreground: "assets/icon_foreground.png"

flutter:
  uses-material-design: true
